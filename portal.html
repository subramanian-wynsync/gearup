<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GearUp — My Study Portal</title>
<style>
:root{--bg:#080d18;--bg2:#0c1424;--panel:#111c30;--panel2:#15223a;--ink:#eaf1ff;--dim:#93a6c6;--line:rgba(130,175,255,.14);
 --gold:#C88A4B;--gold2:#e0a668;--teal:#0FA69A;--blue:#2F6FED;--red:#E8552D;
 --sg:"Space Grotesk","Arial",sans-serif;--in:"Inter","Arial",sans-serif;--mo:"JetBrains Mono","Courier New",monospace}
*{margin:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:var(--in);-webkit-font-smoothing:antialiased}
.btn{font-family:var(--sg);font-weight:600;font-size:14px;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:10px;padding:11px 18px;cursor:pointer;transition:.15s}
.btn:hover{border-color:#5b7fd6}
.btn.gold{background:linear-gradient(135deg,#f0b063,#c07f34);border:none;color:#1c1206}
.btn.gold:hover{filter:brightness(1.08)}
.btn.sm{font-size:13px;padding:8px 13px}
.btn.block{width:100%;text-align:center}
input{width:100%;background:#0b1524;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:12px 14px;font-size:14px;font-family:var(--in)}
input:focus{outline:none;border-color:var(--gold)}
.logo{display:flex;align-items:center;gap:9px;font-family:var(--sg);font-weight:800;font-size:19px}
.logo svg.cog{width:26px;height:26px;animation:spin 7s linear infinite;filter:drop-shadow(0 0 6px rgba(200,138,75,.5))}.logo b{color:var(--gold)}
@keyframes spin{to{transform:rotate(360deg)}}
#tools{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.tool{position:absolute;animation:tfloat var(--d) ease-in-out infinite alternate;filter:drop-shadow(0 0 8px rgba(200,138,75,.16))}
.tool svg{width:100%;height:100%;display:block;animation:ttwirl var(--r) linear infinite var(--rd)}
@keyframes tfloat{from{transform:translateY(0)}to{transform:translateY(-42px)}}
@keyframes ttwirl{to{transform:rotate(360deg)}}
.auth{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px;background:radial-gradient(100% 80% at 50% 0%,rgba(200,138,75,.08),transparent)}
.authcard{background:var(--bg2);border:1px solid var(--line);border-radius:20px;padding:34px;width:100%;max-width:400px;text-align:center;position:relative;z-index:1}
.authcard .logo{justify-content:center;margin-bottom:6px}
.authcard h1{font-family:var(--sg);font-weight:800;font-size:22px;margin:14px 0 4px}
.authcard p.s{color:var(--dim);font-size:14px;margin-bottom:22px}
.field{text-align:left;margin-bottom:13px}.field label{font-size:12px;color:var(--dim);display:block;margin-bottom:5px;font-family:var(--mo)}
.authalt{margin-top:16px;font-size:13px;color:var(--dim)}.authalt a{color:var(--gold2);cursor:pointer}
.shell{display:none;min-height:100vh;position:relative;z-index:1}
.shell.on{display:block}
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;padding:12px 22px;background:rgba(8,13,24,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar .right{margin-left:auto;display:flex;gap:14px;align-items:center}
.topbar .streak{font-family:var(--mo);font-size:13px;color:var(--gold2)}
.avatar-btn{width:40px;height:40px;border-radius:50%;background:var(--panel);border:1px solid var(--line);cursor:pointer;display:grid;place-items:center;overflow:hidden}
.avatar-btn svg,.avatar-btn img{width:100%;height:100%;object-fit:cover;object-position:50% 20%}
.menu{position:absolute;top:58px;right:22px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:6px;display:none;z-index:50;min-width:170px}
.menu.on{display:block}
.menu a{display:block;padding:10px 14px;font-size:14px;border-radius:8px;cursor:pointer}.menu a:hover{background:var(--panel2)}
.wrap{max-width:1080px;margin:0 auto;padding:26px 22px 80px;position:relative;z-index:1}
/* MASCOT STAGE */
.stage{position:relative;display:flex;gap:20px;align-items:center;background:linear-gradient(135deg,rgba(200,138,75,.14),rgba(47,111,237,.08));border:1px solid rgba(200,138,75,.30);border-radius:22px;padding:20px 24px;margin-bottom:26px;overflow:hidden}
.stage .cornergear{position:absolute;opacity:.14}
.stage .cg1{top:-18px;right:-18px;width:120px;height:120px;animation:spin 14s linear infinite}
.stage .cg2{bottom:-24px;right:120px;width:80px;height:80px;animation:spin 10s linear infinite reverse}
.mascot{flex:none;width:184px;filter:drop-shadow(0 10px 22px rgba(0,0,0,.5));transition:transform .25s}
.mascot svg{width:100%;height:auto;display:block}
.mbust{width:100%;border-radius:18px;overflow:hidden;border:1px solid rgba(200,138,75,.45);box-shadow:0 10px 26px rgba(0,0,0,.5);background:#0c1220}
.mbust img{width:100%;display:block}
.mascot.pop{animation:pop .5s ease}
@keyframes pop{0%{transform:translateY(0)}30%{transform:translateY(-10px) scale(1.03)}100%{transform:translateY(0)}}
.speech{flex:1;position:relative;background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:18px 20px}
.speech:before{content:"";position:absolute;left:-9px;top:34px;width:16px;height:16px;background:var(--bg2);border-left:1px solid var(--line);border-bottom:1px solid var(--line);transform:rotate(45deg)}
.speech .nm{font-family:var(--sg);font-weight:800;font-size:21px;line-height:1.15}
.speech .tip{margin-top:9px;font-size:13px;color:var(--gold2);font-family:var(--mo);line-height:1.5}
.speech .mood{font-family:var(--mo);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.sh{display:flex;align-items:baseline;gap:12px;margin:26px 0 14px}
.sh h2{font-family:var(--sg);font-weight:700;font-size:20px}
.sh .c{font-family:var(--mo);font-size:12px;color:var(--dim)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.bcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden}
.bcard .cov{height:96px;padding:16px;display:flex;flex-direction:column;justify-content:space-between;position:relative}
.bcard .cov .ct{font-family:var(--sg);font-weight:800;font-size:18px;color:#fff}
.bcard .cov .cr{width:32px;height:4px;border-radius:3px;background:#fff;opacity:.85}
.bcard .bd{padding:15px 17px 17px}
.bcard .bt{font-family:var(--sg);font-weight:600;font-size:14.5px;line-height:1.2}
.bcard .last{font-size:12px;color:var(--dim);margin:8px 0 6px;font-family:var(--mo)}
.pbar{height:7px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden;margin:8px 0}
.pbar i{display:block;height:100%;border-radius:5px}
.pinfo{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:12px}
.upsell{background:var(--panel);border:1px dashed rgba(200,138,75,.4);border-radius:16px;overflow:hidden;position:relative}
.upsell .promo{position:absolute;top:10px;right:10px;background:var(--gold);color:#1c1206;font-family:var(--mo);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
.upsell .cov{height:70px;padding:14px 16px;display:flex;align-items:flex-end}
.upsell .cov .ct{font-family:var(--sg);font-weight:800;font-size:16px;color:#fff}
.upsell .bd{padding:13px 16px 16px}
.upsell .msg{font-size:13px;color:#cdd9ee;margin-bottom:11px}
.upsell .prow{display:flex;align-items:center;gap:10px}
.upsell .pr{font-family:var(--sg);font-weight:800;font-size:17px}
.upsell .pr s{font-size:12px;color:var(--dim);font-weight:400;margin-right:5px}
.practice{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px}
.practice .q{font-family:var(--sg);font-weight:600;font-size:16px;margin-bottom:14px}
.opt{display:block;width:100%;text-align:left;background:#0b1524;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:9px;cursor:pointer;font-size:14px;color:var(--ink);transition:.12s}
.opt:hover{border-color:#5b7fd6}
.opt.correct{border-color:var(--teal);background:rgba(15,166,154,.14)}
.opt.wrong{border-color:var(--red);background:rgba(232,85,45,.12)}
.opt .mk{font-family:var(--mo);color:var(--dim);margin-right:8px}
.exp{margin-top:12px;padding:12px 14px;border-radius:10px;font-size:13.5px;display:none}
.exp.on{display:block}
.exp.ok{background:rgba(15,166,154,.1);border:1px solid rgba(15,166,154,.3)}
.exp.no{background:rgba(232,85,45,.08);border:1px solid rgba(232,85,45,.3)}
.chips{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px}
.chip{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 18px;flex:1;min-width:120px}
.chip b{font-family:var(--sg);font-weight:800;font-size:22px;display:block}.chip span{font-size:12px;color:var(--dim);font-family:var(--mo)}
.pcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:520px}
.pcard h3{font-family:var(--sg);font-weight:700;font-size:16px;margin-bottom:14px}
.reader-note{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:36px;text-align:center}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111c30;border:1px solid var(--line);color:#eaf1ff;padding:11px 20px;border-radius:30px;z-index:200;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
@media(max-width:640px){.stage{flex-direction:column;align-items:center;text-align:center}.mascot{width:150px}.speech:before{display:none}}
</style><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>

function logoMark(cx,cy,size,color){ const r=size/2; let teeth='';
  for(let i=0;i<8;i++){ const a=i/8*6.2832, x=Math.cos(a)*r, y=Math.sin(a)*r;
    teeth+='<rect x="'+(x-1).toFixed(1)+'" y="'+(y-1).toFixed(1)+'" width="2" height="2" fill="'+color+'"/>'; }
  return '<g transform="translate('+cx+','+cy+')"><circle r="'+r.toFixed(1)+'" fill="none" stroke="'+color+'" stroke-width="'+(r*0.3).toFixed(1)+'"/>'+teeth+
    '<rect x="'+(-r*0.44).toFixed(1)+'" y="'+(-r*0.02).toFixed(1)+'" width="'+(r*0.22).toFixed(1)+'" height="'+(r*0.4).toFixed(1)+'" fill="'+color+'"/>'+
    '<rect x="'+(-r*0.11).toFixed(1)+'" y="'+(-r*0.24).toFixed(1)+'" width="'+(r*0.22).toFixed(1)+'" height="'+(r*0.62).toFixed(1)+'" fill="'+color+'"/>'+
    '<rect x="'+(r*0.22).toFixed(1)+'" y="'+(-r*0.44).toFixed(1)+'" width="'+(r*0.22).toFixed(1)+'" height="'+(r*0.82).toFixed(1)+'" fill="'+color+'"/></g>'; }
function face(mood){
  const HAIR='#17110b', LIP='#8a4a30', EYE='#0d0d14';
  const m=MOODS[mood]||MOODS.confident;
  let brows;
  if(m.brow==='level') brows='<path d="M64 100 q9 -2 18 0"/><path d="M98 100 q9 -2 18 0"/>';
  else if(m.brow==='up') brows='<path d="M64 98 q9 -4 18 -1"/><path d="M98 98 q9 -4 18 -1"/>';
  else if(m.brow==='raise') brows='<path d="M64 101 q9 -1 18 0"/><path d="M98 96 q9 -4 18 0"/>';
  else brows='<path d="M64 97 q9 3 18 4"/><path d="M98 101 q9 -4 18 -3"/>';
  let eyes;
  if(mood==='happy') eyes='<path d="M70 114 q4.5 -5 9 0" fill="none" stroke="'+EYE+'" stroke-width="2.6"/><path d="M101 114 q4.5 -5 9 0" fill="none" stroke="'+EYE+'" stroke-width="2.6"/>';
  else if(mood==='focused') eyes='<rect x="70.5" y="112" width="9" height="3" rx="1.5" fill="'+EYE+'"/><rect x="100.5" y="112" width="9" height="3" rx="1.5" fill="'+EYE+'"/>';
  else if(mood==='thinking') eyes='<circle cx="77" cy="111.5" r="2.8" fill="'+EYE+'"/><circle cx="107" cy="111.5" r="2.8" fill="'+EYE+'"/>';
  else eyes='<circle cx="74.5" cy="113" r="2.9" fill="'+EYE+'"/><circle cx="105.5" cy="113" r="2.9" fill="'+EYE+'"/>';
  let mouth;
  if(m.mouth==='open') mouth='<path d="M81 139 q9 9 18 0 q-9 5 -18 0z" fill="#6a2f1e"/><path d="M84.5 140.5 q4.5 2.5 9 0" fill="none" stroke="#fff" stroke-width="2" opacity=".85"/>';
  else if(m.mouth==='smile') mouth='<path d="M82 141 q8 5 16 0" fill="none" stroke="'+LIP+'" stroke-width="3"/>';
  else if(m.mouth==='small') mouth='<path d="M85 142 q5 -2 10 1" fill="none" stroke="'+LIP+'" stroke-width="3"/>';
  else if(m.mouth==='flat') mouth='<path d="M83 142 q7 2 14 0" fill="none" stroke="'+LIP+'" stroke-width="3"/>';
  else mouth='<path d="M83 142 h14" fill="none" stroke="'+LIP+'" stroke-width="3.4"/>';
  return '<g stroke="'+HAIR+'" stroke-width="4" stroke-linecap="round" fill="none">'+brows+'</g><g stroke-linecap="round">'+eyes+mouth+'</g>';
}

  return `<div class="stage">
    <svg class="cornergear cg1" viewBox="0 0 64 64" fill="#C88A4B"><path d="M32 4l4 7 8-2 1 8 8 2-3 8 6 6-6 6 3 8-8 2-1 8-8-2-4 7-4-7-8 2-1-8-8-2 3-8-6-6 6-6-3-8 8-2 1-8 8 2z"/><circle cx="32" cy="32" r="9" fill="#0c1424"/></svg>
    <svg class="cornergear cg2" viewBox="0 0 64 64" fill="#7fa8ff"><path d="M32 4l4 7 8-2 1 8 8 2-3 8 6 6-6 6 3 8-8 2-1 8-8-2-4 7-4-7-8 2-1-8-8-2 3-8-6-6 6-6-3-8 8-2 1-8 8 2z"/><circle cx="32" cy="32" r="9" fill="#0c1424"/></svg>
    <div class="mascot" id="mascot">${mascotEl(mood,184)}</div>
    <div class="speech"><div class="mood" id="sp-mood">GearUp mechanic</div><div class="nm" id="sp-nm">${line}</div>${tip?`<div class="tip" id="sp-tip">🔧 ${esc(tip)}</div>`:'<div class="tip" id="sp-tip"></div>'}</div>
  </div>`;
}
function setMascot(mood,line){ const el=document.getElementById('mascot'); if(el){ el.innerHTML=mascotEl(mood,184); el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
  if(line){ const nm=document.getElementById('sp-nm'); if(nm) nm.textContent=line; } }

function nav(v){ S.view=v; toggleMenu(true); const V=document.getElementById('view'); window.scrollTo(0,0);
  if(v==='dashboard') V.innerHTML=dashHTML(); else if(v==='profile') V.innerHTML=profileHTML(); }
function bookCov(b,h){ return `<div class="cov" style="background:linear-gradient(150deg,${b.acc}44,#0a1220);height:${h||96}px"><div class="ct">${esc(b.cov)}</div><div class="cr" style="background:${b.acc}"></div></div>`; }
function dashHTML(){
  const owned=D.books.filter(b=>b.owned), miss=D.books.filter(b=>!b.owned);
  const hi=owned.length?owned.reduce((a,b)=>b.pct>a.pct?b:a,owned[0]):null;
  const lib=owned.map(b=>`<div class="bcard">${bookCov(b)}
    <div class="bd"><div class="bt">${esc(b.title)}</div><div class="last">▸ ${esc(b.last)}</div>
      <div class="pbar"><i style="width:${b.pct}%;background:linear-gradient(90deg,${b.acc},${b.acc2})"></i></div>
      <div class="pinfo"><span>${b.pct}% complete</span><span>${Math.round(b.pct/100*b.chapters)}/${b.chapters} chapters</span></div>
      <button class="btn gold block sm" onclick="openBook('${b.id}')">Continue reading →</button></div></div>`).join('');
  const ups=miss.map(b=>{const disc=Math.round(b.price*0.8); return `<div class="upsell"><div class="promo">READER'S 20% OFF</div>${bookCov(b,70)}
    <div class="bd"><div class="bt" style="margin-bottom:6px">${esc(b.title)}</div>
      <div class="msg">You're ${hi?hi.pct:0}% through ${esc(hi?hi.cov:'your books')} — add this next and keep your momentum. Reader's discount applied.</div>
      <div class="prow"><div class="pr"><s>${money(b.price)}</s>${money(disc)}</div><button class="btn gold sm" style="margin-left:auto" onclick="goToStripeCheckout(['${b.id}'])">Add — ${money(disc)}</button></div></div></div>`;}).join('');
  const m=D.mcqs[S.qi%D.mcqs.length];
  const quiz=`<div class="practice"><div style="font-family:var(--mo);font-size:12px;color:var(--gold2);margin-bottom:10px">DAILY PRACTICE · ${esc(m.book)}</div>
    <div class="q">${esc(m.q)}</div><div id="opts">${m.options.map((o,i)=>`<button class="opt" onclick="answer(${i})"><span class="mk">${'ABCD'[i]}</span>${esc(o)}</button>`).join('')}</div>
    <div class="exp" id="exp"></div>
    <button class="btn sm" style="margin-top:12px;display:none" id="nextq" onclick="S.qi++;nav('dashboard')">Next question →</button></div>`;
  return stageHTML('happy',`Welcome back, ${esc(S.name)}! 🔧`, TIPS[S.streak%TIPS.length])+
    `<div class="chips"><div class="chip"><b id="pts">${S.points}</b><span>points</span></div><div class="chip"><b>${owned.length}</b><span>books owned</span></div><div class="chip"><b>${hi?hi.pct:0}%</b><span>furthest book</span></div></div>`+
    `<div class="sh"><h2>Continue studying</h2><span class="c">where you left off</span></div><div class="grid">${lib||'<p style="color:#93a6c6;grid-column:1/-1">No books on this account yet.</p>'}</div>`+
    `<div class="sh"><h2>Daily practice</h2><span class="c">keep the streak alive</span></div>${quiz}`+
    `<div class="sh"><h2>Complete your library</h2><span class="c">reader-only offers</span></div><div class="grid">${ups}</div>`;
}
function answer(i){ const m=D.mcqs[S.qi%D.mcqs.length]; const opts=document.querySelectorAll('#opts .opt'); opts.forEach(o=>o.style.pointerEvents='none');
  const exp=document.getElementById('exp'); const tip=document.getElementById('sp-tip');
  if(i===m.correct){ opts[i].classList.add('correct'); S.points+=10; setMascot('happy','Nice one, '+S.name+'! 🎉 +10 points');
    if(tip) tip.textContent=''; exp.className='exp on ok'; exp.innerHTML='<b>Correct.</b> '+esc(m.exp);
    const p=document.getElementById('pts'); if(p) p.textContent=S.points; const tp=document.getElementById('tb-pts'); if(tp) tp.textContent=S.points; document.getElementById('sp-mood').textContent='Happy · +points'; }
  else { opts[i].classList.add('wrong'); opts[m.correct].classList.add('correct'); setMascot('thinking','Close! Let’s learn this one together.');
    if(tip) tip.textContent='🔧 Read the explanation below — then you’ve got it.'; exp.className='exp on no'; exp.innerHTML='<b>Not quite — the answer is '+'ABCD'[m.correct]+'.</b> '+esc(m.exp);
    document.getElementById('sp-mood').textContent='Let’s learn it'; }
  document.getElementById('nextq').style.display='inline-block';
}
function openBook(id){ const b=D.books.find(x=>x.id===id);
  document.getElementById('view').innerHTML=`<button class="btn sm" onclick="nav('dashboard')">← Back to dashboard</button>
    <div class="reader-note" style="margin-top:18px;border-top:4px solid ${b.acc}">
      <div style="width:130px;margin:0 auto 12px">${mascotEl('thinking',130)}</div>
      <h2 style="font-family:var(--sg);font-weight:800;font-size:22px">${esc(b.title)}</h2>
      <p style="color:var(--dim);margin:10px auto;max-width:460px">Here your full interactive reader opens at <b>${esc(b.last)}</b> — the same reader you've already seen, with cross-references, tap-to-zoom figures, self-checks and case studies. In the live app it loads right here, and your progress saves as you read.</p>
      <button class="btn gold" onclick="toast('The interactive reader connects here in the live build')">Open the reader →</button></div>`;
  window.scrollTo(0,0);
}
function profileHTML(){
  return stageHTML('confident',`Your account, ${esc(S.name)}`,'update your details and password any time.')+
   `<div class="pcard"><h3>Account details</h3>
     <div class="field"><label style="font-size:12px;color:var(--dim);font-family:var(--mo)">Name</label><input value="${esc(S.name)}"></div>
     <div class="field" style="margin-top:12px"><label style="font-size:12px;color:var(--dim);font-family:var(--mo)">Email (your login)</label><input value="${esc(S.email||'')}" readonly></div>
     <button class="btn gold sm" style="margin-top:14px" onclick="toast('Saved ✓')">Save changes</button></div>
   <div class="pcard" style="margin-top:18px"><h3>Change password</h3>
     <div class="field"><label style="font-size:12px;color:var(--dim);font-family:var(--mo)">Current password</label><input type="password" placeholder="••••••••"></div>
     <div class="field" style="margin-top:12px"><label style="font-size:12px;color:var(--dim);font-family:var(--mo)">New password</label><input type="password" placeholder="••••••••"></div>
     <button class="btn gold sm" style="margin-top:14px" onclick="toast('Password updated ✓')">Update password</button></div>
   <div class="pcard" style="margin-top:18px"><h3>My purchases</h3>
     ${D.books.filter(b=>b.owned).map(b=>`<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px"><span>${esc(b.title)}</span><span style="color:var(--dim);font-family:var(--mo)">lifetime access</span></div>`).join('')}
   </div>`;
}
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),1700);}
document.addEventListener('click',e=>{ if(!e.target.closest('#av-btn')&&!e.target.closest('#menu')) toggleMenu(true); });
</script><script>
const gu = GearUpAuth(GEARUP_CONFIG.SUPABASE_URL, GEARUP_CONFIG.SUPABASE_ANON_KEY);
window.goToStripeCheckout = async function(items){
  try{ const r=await fetch('/api/create-checkout-session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items})});
    const d=await r.json(); if(d.url){ location.href=d.url; } else { toast(d.error||'Checkout error'); } }
  catch(e){ toast('Checkout unavailable — try again'); } };
window.logout = function(){ gu.signOut().then(()=>location.href='login.html'); };
window.openBook = async function(id){ toast('Opening your book…'); const url=await gu.openBookUrl(id); if(url) location.href=url; };
(async function(){
  let u=null; try{ u=await gu.getUser(); }catch(e){}
  if(!u){ location.href='login.html'; return; }
  await gu.claimSession();
  const owned=await gu.ownedBooks(); let prog=[]; try{ prog=await gu.getProgress(); }catch(e){}
  D.books.forEach(b=>{ b.owned=owned.includes(b.id); const pr=prog.find(p=>p.book_id===b.id); b.pct=pr?pr.pct:0; b.last=pr?('Chapter '+(pr.chapter||1)):'Start reading'; });
  S.name=(u.email||'there').split('@')[0]; S.email=u.email||'';
  document.getElementById('auth').style.display='none';
  document.getElementById('shell').classList.add('on');
  document.getElementById('av-btn').innerHTML=faceChip();
  nav('dashboard');
})();
</script>
</body></html>
