<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>GearUp — Log in</title>
<style>
body{margin:0;background:#080d18;color:#eaf1ff;font-family:Inter,Arial,sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center}
.card{background:#0c1424;border:1px solid rgba(130,175,255,.14);border-radius:20px;padding:34px;width:100%;max-width:400px;text-align:center}
.logo{font-family:'Space Grotesk',Arial,sans-serif;font-weight:800;font-size:22px;margin-bottom:6px}.logo b{color:#C88A4B}
h1{font-size:20px;margin:10px 0 6px}p{color:#93a6c6;font-size:14px}
input{width:100%;box-sizing:border-box;background:#0b1524;border:1px solid rgba(130,175,255,.14);color:#eaf1ff;border-radius:10px;padding:12px 14px;font-size:14px;margin:8px 0}
input:focus{outline:none;border-color:#C88A4B}
.btn{width:100%;background:linear-gradient(135deg,#f0b063,#c07f34);border:none;color:#1c1206;font-weight:700;border-radius:10px;padding:13px;font-size:15px;cursor:pointer;margin-top:8px}
.link{background:none;border:none;color:#93a6c6;font-size:13px;cursor:pointer;margin-top:16px;text-decoration:underline}
.link:hover{color:#e0a668}
#note{margin-top:14px;font-size:13px;color:#e0a668;min-height:18px;line-height:1.5}
</style></head><body>
<div class="card">
  <div class="logo">Gear<b>Up</b></div>
  <h1>Log in to your books</h1>
  <p id="sub">Enter your email and password.</p>
  <input id="email" type="email" placeholder="you@email.com" autocomplete="email">
  <input id="password" type="password" placeholder="Your password" autocomplete="current-password">
  <button class="btn" id="go">Log in →</button>
  <div id="note"></div>
  <button class="link" id="forgot">Forgot your password? Reset it</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script><script src="auth.js"></script>
<script>
const gu=GearUpAuth(GEARUP_CONFIG.SUPABASE_URL,GEARUP_CONFIG.SUPABASE_ANON_KEY);
const note=document.getElementById('note');
gu.getUser().then(u=>{ if(u) location.href='portal.html'; });
const q=new URLSearchParams(location.search);
if(q.get('kicked')) note.textContent='Signed out — your account was opened on another device.';
if(q.get('welcome')) note.textContent='🎉 Payment received! Check your email for your temporary password, then log in here.';
if(q.get('reset')) note.textContent='Your password is set. Log in with your email and new password.';

document.getElementById('go').onclick=async()=>{
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  if(!email||!password){ note.textContent='Enter your email and password.'; return; }
  note.textContent='Logging in…';
  const {error}=await gu.sb.auth.signInWithPassword({email,password});
  if(error){ note.textContent='Error: '+error.message; }
  else { location.href='portal.html'; }
};
document.getElementById('password').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('go').click(); });

document.getElementById('forgot').onclick=async()=>{
  const email=document.getElementById('email').value.trim();
  if(!email){ note.textContent='Enter your email first, then click again.'; return; }
  note.textContent='Sending your reset link…';
  const {error}=await gu.sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+'/reset.html'});
  note.textContent = error ? ('Error: '+error.message) : '✓ Reset link sent. Check your email, click it, and choose a new password.';
};
</script></body></html>
