<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>GearUp — Set a new password</title>
<style>
body{margin:0;background:#080d18;color:#eaf1ff;font-family:Inter,Arial,sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center}
.card{background:#0c1424;border:1px solid rgba(130,175,255,.14);border-radius:20px;padding:34px;width:100%;max-width:400px;text-align:center}
.logo{font-family:'Space Grotesk',Arial,sans-serif;font-weight:800;font-size:22px;margin-bottom:6px}.logo b{color:#C88A4B}
h1{font-size:20px;margin:10px 0 6px}p{color:#93a6c6;font-size:14px}
input{width:100%;box-sizing:border-box;background:#0b1524;border:1px solid rgba(130,175,255,.14);color:#eaf1ff;border-radius:10px;padding:12px 14px;font-size:14px;margin:8px 0}
input:focus{outline:none;border-color:#C88A4B}
.btn{width:100%;background:linear-gradient(135deg,#f0b063,#c07f34);border:none;color:#1c1206;font-weight:700;border-radius:10px;padding:13px;font-size:15px;cursor:pointer;margin-top:8px}
.btn[disabled]{opacity:.5;cursor:default}
.link{background:none;border:none;color:#93a6c6;font-size:13px;cursor:pointer;margin-top:16px;text-decoration:underline}
.link:hover{color:#e0a668}
#note{margin-top:14px;font-size:13px;color:#e0a668;min-height:18px;line-height:1.5}
</style></head><body>
<div class="card">
  <div class="logo">Gear<b>Up</b></div>
  <h1>Set a new password</h1>
  <p id="sub">Choose a new password for your account.</p>
  <div id="form">
    <input id="password" type="password" placeholder="New password" autocomplete="new-password">
    <input id="password2" type="password" placeholder="Repeat new password" autocomplete="new-password">
    <button class="btn" id="go">Save new password →</button>
  </div>
  <div id="note"></div>
  <button class="link" id="back" style="display:none">Back to log in</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script><script src="auth.js"></script>
<script>
const gu=GearUpAuth(GEARUP_CONFIG.SUPABASE_URL,GEARUP_CONFIG.SUPABASE_ANON_KEY);
const note=document.getElementById('note');
const form=document.getElementById('form');
const backBtn=document.getElementById('back');
backBtn.onclick=()=>location.href='login.html';

let ready=false;
// supabase-js reads the recovery token from the URL and fires PASSWORD_RECOVERY.
gu.sb.auth.onAuthStateChange((event)=>{ if(event==='PASSWORD_RECOVERY'){ ready=true; note.textContent=''; } });

// Fallback: if a session already exists (link opened), allow the reset too.
setTimeout(async()=>{
  if(ready) return;
  const {data}=await gu.sb.auth.getSession();
  if(data.session){ ready=true; }
  else {
    form.style.display='none';
    note.textContent='This reset link is invalid or has expired. Please request a new one.';
    backBtn.style.display='inline-block';
  }
},1500);

document.getElementById('go').onclick=async()=>{
  if(!ready){ note.textContent='Still loading your reset link, one moment…'; return; }
  const p1=document.getElementById('password').value;
  const p2=document.getElementById('password2').value;
  if(!p1||p1.length<6){ note.textContent='Please use at least 6 characters.'; return; }
  if(p1!==p2){ note.textContent='The two passwords do not match.'; return; }
  document.getElementById('go').disabled=true;
  note.textContent='Saving…';
  const {error}=await gu.sb.auth.updateUser({password:p1});
  if(error){ note.textContent='Error: '+error.message; document.getElementById('go').disabled=false; return; }
  form.style.display='none';
  note.textContent='✓ Password saved. Taking you to log in…';
  await gu.sb.auth.signOut();
  setTimeout(()=>location.href='login.html?reset=1',1400);
};
document.getElementById('password2').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('go').click(); });
</script></body></html>
